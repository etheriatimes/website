services:
  db:
    image: postgres:16-alpine
    container_name: etheria-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: aether
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: etheria_account
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aether -d etheria_account"]
      interval: 10s
      timeout: 5s
      retries: 5

  etheriatimes:
    build:
      context: .
      dockerfile: Dockerfile.cloud
    image: etheria-prod:latest
    container_name: etheriatimes
    restart: unless-stopped
    expose:
      - "8080"
      - "5432"
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      ENVIRONMENT: production
      DATABASE_URL: postgresql://aether:${DB_PASSWORD}@db:5432/etheria_account
      JWT_SECRET: ${JWT_SECRET}
      SERVER_PORT: 8080
      NEXT_PUBLIC_API_URL: https://api.etheriatimes.com
      NEXT_PUBLIC_ENVIRONMENT: production
      CORS_ALLOWED_ORIGINS: https://etheriatimes.com,https://www.etheriatimes.com
    working_dir: /app
    command: ["/entrypoint.sh"]
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
