services:
  etheriatimes:
    build:
      context: .
      dockerfile: Dockerfile.cloud
    image: etheriatimes:latest
    container_name: etheriatimes
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://aether:${DB_PASSWORD}@localhost:5432/etheria_account
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ALLOWED_ORIGINS=https://etheriatimes.com,https://www.etheriatimes.com
      - SERVER_PORT=8080
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
