services:
  db:
    image: postgres:16-alpine
    container_name: etheria-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: aether
      POSTGRES_PASSWORD: password
      POSTGRES_DB: etheria_account
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aether -d etheria_account"]
      interval: 10s
      timeout: 5s
      retries: 5

  etheriatimes:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: etheria-dev:latest
    container_name: etheriatimes
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "8080:8080"
    environment:
      NODE_ENV: development
      ENVIRONMENT: local
      DATABASE_URL: postgresql://aether:password@db:5432/etheria_account
      JWT_SECRET: dev-secret-change-in-production
      SERVER_PORT: 8080
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_ENVIRONMENT: local
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    volumes:
      # Hot-reload Go
      - ./server:/app/server
      - ./.air.toml:/app/.air.toml
      # Hot-reload Next.js
      - ./app:/app/app
      # Volume anonyme pour protéger node_modules du bind mount
      - node_modules:/app/app/node_modules
    working_dir: /app
    command: ["/entrypoint.sh"]
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  node_modules:
